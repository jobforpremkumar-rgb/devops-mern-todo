name: MERN CI

on:
 push:
   branches: [main]

jobs:
  mongo-init:
   runs-on: ubuntu-latest
  
   services:
    mongo:
     image: mongo
     ports : ["27017:27017"]

   steps:
    - name: Checkout Repositary
      uses: actions/checkout@v5
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
       node-version: "18"

    - name: waiting for mongoDB to be ready
      run : |
           until nc -z localhost 27017; do
           echo "Waiting for a mongoDB"
           sleep 2
           done
           echo "MongoDB is UP"

    - name: Seed mongoDB
      working-directory: ./backend
      run: |
       npm install
       node seedTasksData.js
  
  test:
    runs-on: ubuntu-latest
    needs: mongo-init

    steps:
      - name: checkout Repositary
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
         node-version: "18"

      - name: Install Dependencies for backend
        working-directory: ./backend
        run: npm install 

      - name: Running Backend Tests
        working-directory: ./backend
        run: npm test


    